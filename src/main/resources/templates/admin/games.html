<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Управление играми</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f5f5f5; padding: 20px; }
        .header { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        h1 { color: #333; }
        .header-actions { display: flex; gap: 10px; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; font-weight: 600; transition: all 0.3s; display: inline-block; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.4); }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-secondary:hover { background: #e0e0e0; }
        .btn-small { padding: 5px 10px; font-size: 14px; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn-info { background: #3498db; color: white; }
        .games-table { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; }
        th { background: #667eea; color: white; font-weight: 600; }
        tr:nth-child(even) { background: #f9f9f9; }
        tr:hover { background: #f0f0f0; }
        .status-badge { padding: 5px 10px; border-radius: 15px; font-size: 12px; font-weight: 600; display: inline-block; }
        .status-NEW { background: #e8f5e9; color: #2e7d32; }
        .status-OPEN_FOR_REGISTRATION { background: #fff3e0; color: #ef6c00; }
        .status-ACTIVE { background: #e3f2fd; color: #1565c0; }
        .status-COMPLETED { background: #fce4ec; color: #c2185b; }
        .actions { display: flex; gap: 5px; flex-wrap: wrap; }
        .status-controls { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
        .no-games { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <h1>☢️ Управление играми</h1>
        <div class="header-actions">
            <a href="/admin/games/new" class="btn btn-primary">+ Создать игру</a>
            <a href="/admin/logout" class="btn btn-secondary">Выход</a>
        </div>
    </div>
    <div class="games-table">
        <table th:if="${games != null && !games.isEmpty()}">
            <thead>
                <tr><th>ID</th><th>Название</th><th>Дата начала</th><th>Статус</th><th>Участники</th><th>Действия</th></tr>
            </thead>
            <tbody>
                <tr th:each="game : ${games}">
                    <td th:text="${game.id}"></td>
                    <td th:text="${game.name}"></td>
                    <td th:text="${#temporals.format(game.startDateTime, 'dd.MM.yyyy HH:mm')}"></td>
                    <td>
                        <span th:class="'status-badge status-' + ${game.status}" th:text="${game.status.name()}"></span>
                        <div class="status-controls">
                            <form th:action="@{/admin/games/{id}/status(id=${game.id})}" method="post" style="display: inline;">
                                <input type="hidden" name="status" value="NEW">
                                <button type="submit" class="btn btn-small btn-secondary" th:disabled="${game.status.name() == 'NEW'}">Новая</button>
                            </form>
                            <form th:action="@{/admin/games/{id}/status(id=${game.id})}" method="post" style="display: inline;">
                                <input type="hidden" name="status" value="OPEN_FOR_REGISTRATION">
                                <button type="submit" class="btn btn-small btn-info" th:disabled="${game.status.name() == 'OPEN_FOR_REGISTRATION'}">Регистрация</button>
                            </form>
                            <form th:action="@{/admin/games/{id}/status(id=${game.id})}" method="post" style="display: inline;">
                                <input type="hidden" name="status" value="ACTIVE">
                                <button type="submit" class="btn btn-small btn-success" th:disabled="${game.status.name() == 'ACTIVE'}">Активна</button>
                            </form>
                            <form th:action="@{/admin/games/{id}/status(id=${game.id})}" method="post" style="display: inline;">
                                <input type="hidden" name="status" value="COMPLETED">
                                <button type="submit" class="btn btn-small btn-danger" th:disabled="${game.status.name() == 'COMPLETED'}">Завершена</button>
                            </form>
                        </div>
                    </td>
                    <td th:text="${game.participants.size()}"></td>
                    <td>
                        <div class="actions">
                            <a th:href="@{/admin/games/{id}/participants(id=${game.id})}" class="btn btn-small btn-info">Участники</a>
                            <a th:href="@{/admin/games/{id}/edit(id=${game.id})}" class="btn btn-small btn-secondary">Редактировать</a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
        <div th:if="${games == null || games.isEmpty()}" class="no-games">
            <p>Нет созданных игр</p>
            <a href="/admin/games/new" class="btn btn-primary" style="margin-top: 20px;">Создать первую игру</a>
        </div>
    </div>
</body>
</html>
