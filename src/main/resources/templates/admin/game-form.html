<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создать игру</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #333; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #555; margin-bottom: 5px; font-weight: 600; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 5px; font-size: 16px; transition: border-color 0.3s; }
        input:focus { outline: none; border-color: #667eea; }
        .button-group { display: flex; gap: 10px; margin-top: 30px; }
        button, .btn { padding: 12px 30px; border: none; border-radius: 5px; font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; transition: all 0.3s; }
        button[type="submit"] { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; flex: 1; }
        button[type="submit"]:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.4); }
        .btn-secondary { background: #f0f0f0; color: #333; flex: 1; text-align: center; }
        .btn-secondary:hover { background: #e0e0e0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Создать новую игру</h1>
        <form method="post" action="/admin/games/create">
            <div class="form-group">
                <label for="name">Название игры:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="startDateTime">Дата и время начала:</label>
                <input type="datetime-local" id="startDateTime" name="startDateTime" required>
            </div>
            <div class="button-group">
                <button type="submit">Создать игру</button>
                <a href="/admin/games" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</body>
</html>
